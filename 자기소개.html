<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>유준현 | GitHub Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #e2e8f0;
            text-align: center;
        }
        .container {
            padding: 50px 20px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        h2 {
            color: #38bdf8;
            margin-bottom: 30px;
        }
        .card {
            background: #1e293b;
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        p {
            line-height: 1.6;
        }
        .highlight {
            color: #22c55e;
            font-weight: bold;
        }
        footer {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👋 안녕하세요, 유준현입니다</h1>
        <h2>High School Student & Gamer</h2>

        <div class="card">
            <p>
                저는 대한민국에 살고 있는 <span class="highlight">고등학교 2학년</span>입니다.
            </p>
            <p>
                <span class="highlight">게임</span>을 정말 좋아하고,
                언젠가는 <span class="highlight">프로게이머</span>가 되는 것이 꿈입니다.
            </p>
            <p>
                다양한 게임을 즐기면서 실력을 키우고 있고,
                앞으로 더 성장해 나가고 싶습니다.
            </p>
        </div>

        <footer>
            © 2026 유준현 | GitHub Pages
        </footer>
    </div>
</body>
</html>
